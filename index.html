<!DOCTYPE html>
<html lang="id">

<head>

    <!-- ===================================================== -->
    <!-- META -->
    <!-- ===================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- ===================================================== -->
    <!-- TITLE -->
    <!-- ===================================================== -->

    <title>Undangan Pernikahan</title>

    <!-- ===================================================== -->
    <!-- CSS -->
    <!-- ===================================================== -->

    <link
        rel="stylesheet"
        href="style.css"
    >

    <!-- ===================================================== -->
    <!-- GOOGLE FONTS -->
    <!-- ===================================================== -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        rel="preload"
        as="style"
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,700&display=swap"
    >

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,700&display=swap"
    >

</head>

<body>

    <!-- ===================================================== -->
    <!-- AUDIO -->
    <!-- ===================================================== -->

    <audio
        id="bg-music"
        loop
        preload="metadata"
        playsinline
        muted
    >

        <source
            src="https://smcdn.s45.in/whatsapp/2026/05/09/document/6281213149979-3EB063F2C8314267A45FFF"
            type="audio/mpeg"
        >

    </audio>

    <!-- ===================================================== -->
    <!-- COVER -->
    <!-- ===================================================== -->

    <section id="cover">

        <!-- Overlay Gelap -->
        <div class="overlay"></div>

        <!-- Isi Cover -->
        <div class="cover-content">

            <p class="top-sub">
                THE WEDDING OF
            </p>

            <h1 class="couple-names">
                M
                <span>&</span>
                R
            </h1>

            <!-- Divider -->
            <div class="divider">

                <span class="line"></span>

                <span class="diamond">
                    ◆
                </span>

                <span class="line"></span>

            </div>

            <p class="date">
                Esok Hari, (Jika Tidak Hujan)
            </p>

            <!-- Tombol Buka -->
            <button
                id="btn-open"
                type="button"
                aria-label="Buka Undangan Pernikahan Romeo dan Juliet"
            >

                <span class="btn-text">
                    Buka Undangan
                </span>

                <span class="btn-icon">
                    ✉
                </span>

            </button>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- MAIN CONTENT -->
    <!-- ===================================================== -->

    <main
        id="main-content"
        class="hidden"
    >

        <!-- Sidebar Background Desktop -->
        <div class="bg-sidebar"></div>

        <!-- Konten Utama -->
        <div class="content-container">

            <!-- ============================================= -->
            <!-- MUSIC CONTROL -->
            <!-- ============================================= -->

            <button
                id="music-toggle"
                type="button"
                aria-label="Toggle music"
            >

                <div class="ripple"></div>

                <svg
                    id="music-icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >

                    <path d="M9 18V5l12-2v13"></path>

                    <circle
                        cx="6"
                        cy="18"
                        r="3"
                    ></circle>

                    <circle
                        cx="18"
                        cy="16"
                        r="3"
                    ></circle>

                </svg>

            </button>

            <!-- ============================================= -->
            <!-- TAB CONTENT -->
            <!-- ============================================= -->

            <!-- Home -->
            <section
                id="home"
                class="tab-content active"
                role="tabpanel"
            >
                <h2>Home</h2>
            </section>

            <!-- Quotes -->
            <section
                id="quotes"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Quotes</h2>
            </section>

            <!-- Bride -->
            <section
                id="bride"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Bride</h2>
            </section>

            <!-- Event -->
            <section
                id="event"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Event</h2>
            </section>

            <!-- Maps -->
            <section
                id="maps"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Maps</h2>
            </section>

            <!-- Time -->
            <section
                id="time"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Time</h2>
            </section>

            <!-- RSVP -->
            <section
                id="rsvp"
                class="tab-content"
                role="tabpanel"
            >
                <h2>RSVP</h2>
            </section>

            <!-- Gift -->
            <section
                id="gift"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Gift</h2>
            </section>

            <!-- Thanks -->
            <section
                id="thanks"
                class="tab-content"
                role="tabpanel"
            >
                <h2>Thanks</h2>
            </section>

            <!-- ============================================= -->
            <!-- BOTTOM NAVIGATION -->
            <!-- ============================================= -->

            <nav
                class="bottom-nav"
                role="tablist"
            >

                <button
                    type="button"
                    class="nav-link active"
                    data-target="home"
                    role="tab"
                    aria-selected="true"
                    aria-controls="home"
                >
                    <span class="nav-text">
                        Home
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="quotes"
                    role="tab"
                    aria-selected="false"
                    aria-controls="quotes"
                >
                    <span class="nav-text">
                        Quotes
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="bride"
                    role="tab"
                    aria-selected="false"
                    aria-controls="bride"
                >
                    <span class="nav-text">
                        Bride
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="event"
                    role="tab"
                    aria-selected="false"
                    aria-controls="event"
                >
                    <span class="nav-text">
                        Event
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="maps"
                    role="tab"
                    aria-selected="false"
                    aria-controls="maps"
                >
                    <span class="nav-text">
                        Maps
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="time"
                    role="tab"
                    aria-selected="false"
                    aria-controls="time"
                >
                    <span class="nav-text">
                        Time
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="rsvp"
                    role="tab"
                    aria-selected="false"
                    aria-controls="rsvp"
                >
                    <span class="nav-text">
                        RSVP
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="gift"
                    role="tab"
                    aria-selected="false"
                    aria-controls="gift"
                >
                    <span class="nav-text">
                        Gift
                    </span>
                </button>

                <button
                    type="button"
                    class="nav-link"
                    data-target="thanks"
                    role="tab"
                    aria-selected="false"
                    aria-controls="thanks"
                >
                    <span class="nav-text">
                        Thanks
                    </span>
                </button>

            </nav>

        </div>

    </main>

    <!-- ===================================================== -->
    <!-- JAVASCRIPT -->
    <!-- ===================================================== -->

    <script src="script.js"></script>

</body>

</html>
